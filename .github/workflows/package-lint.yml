name: package-lint

on:
  push:
    paths:
      - '**.el'
      - '.github/workflows/package-lint.yml'
      - 'Makefile'
  pull_request:
    paths:
      - '**.el'
      - '.github/workflows/package-lint.yml'
      - 'Makefile'

jobs:
  lint:
    name: package-lint on Emacs ${{ matrix.emacs_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - '30.2'
        include:
          - emacs_version: 'snapshot'
            allow-failure: true
    steps:
      - uses: actions/checkout@v5

      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Run package-lint via make
        run: make lint
        continue-on-error: ${{ matrix.allow-failure == true }}

      - name: Run checkdoc via make
        run: make checkdoc
        continue-on-error: ${{ matrix.allow-failure == true }}

      - name: Run check-declare via make
        run: make check-declare
        continue-on-error: ${{ matrix.allow-failure == true }}
