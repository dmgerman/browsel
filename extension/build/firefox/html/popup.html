<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 260px;
      padding: 12px;
      margin: 0;
    }
    h1 { font-size: 13px; margin: 0; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .header .logo { width: 32px; height: 32px; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #999; }
    .dot.connected    { background: #4a4; }
    .dot.connecting   { background: #c80; }
    .dot.disconnected { background: #c33; }
    .dot.incompatible { background: #c33; box-shadow: 0 0 0 2px #fbb; }
    .status-text { font-size: 12px; color: #333; }
    button.reconnect {
      width: 100%;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      margin-bottom: 10px;
    }
    button.reconnect:hover { background: #e8e8e8; }
    h2 { font-size: 11px; color: #888; margin: 10px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    button.action {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
      margin-bottom: 5px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      text-align: left;
    }
    button.action:hover { background: #e8e8e8; }
    button.action[disabled] { opacity: 0.45; cursor: not-allowed; }
    button.action .shortcut {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 10px;
      color: #666;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
    }
    .consent-line {
      margin: 4px 0 10px;
      font-size: 12px;
    }
    .consent-line-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .consent-line-label {
      color: #777;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .consent-state { font-size: 12px; flex: 1; }
    .consent-state.granted { color: #2a8a2a; font-weight: 500; }
    .consent-state.absent  { color: #999; }
    .consent-buttons { display: flex; gap: 4px; flex-wrap: wrap; }
    .consent-buttons button {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #bbb;
      background: #fff;
      color: #333;
      border-radius: 3px;
      cursor: pointer;
    }
    .consent-buttons button:hover { background: #f0f0f0; }
    .consent-buttons button.revoke { background: #fee; border-color: #f99; }
    .consent-buttons button.revoke:hover { background: #fcc; }
    .consented-tabs { margin-bottom: 10px; }
    .consented-tabs .header {
      font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 4px 0 6px;
    }
    .ctab {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 6px; border-radius: 4px;
      font-size: 12px; cursor: pointer;
      background: #fff7f7; border: 1px solid #f3d6d6; margin-bottom: 4px;
    }
    .ctab:hover { background: #ffe9e9; }
    .ctab .fav { width: 14px; height: 14px; flex-shrink: 0; }
    .ctab .meta { flex: 1; min-width: 0; }
    .ctab .title {
      color: #222; font-size: 12px; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ctab .sub { color: #888; font-size: 10px; line-height: 1.2; }
    .ctab button.revoke {
      font-size: 10px; padding: 2px 6px;
      background: #fee; border: 1px solid #f99; color: #722;
      border-radius: 3px; cursor: pointer; flex-shrink: 0;
    }
    .ctab button.revoke:hover { background: #fcc; }
    .sw-error {
      display: none;
      background: #fee;
      color: #722;
      border: 1px solid #f99;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 12px;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .sw-error strong { color: #c33; }
    .sw-error code {
      background: rgba(0,0,0,0.05);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
    }
    .identity {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 2px 8px;
      align-items: baseline;
      margin-bottom: 12px;
      padding: 6px 8px;
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 4px;
    }
    .identity .label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .identity .value {
      font-size: 12px;
      color: #222;
      word-break: break-all;
    }
    .identity .uuid {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
    }
    .identity .default-hint {
      color: #999;
      font-size: 11px;
      font-style: italic;
      margin-left: 4px;
    }
    #message { font-size: 11px; color: #555; margin-top: 8px; min-height: 16px; }
    #options-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      color: #4a90d9;
      text-decoration: none;
      cursor: pointer;
    }
    #options-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Browsel</h1>
    <img id="logo" class="logo" src="../icons/icon128.png" alt="">
  </div>

  <div class="status-row">
    <div id="dot" class="dot disconnected"></div>
    <div id="status-text" class="status-text">Disconnected</div>
  </div>

  <div id="sw-error" class="sw-error"></div>

  <div id="identity" class="identity">
    <span class="label">name</span>
    <span class="value">
      <span id="identity-name">…</span><span id="identity-name-hint" class="default-hint"></span>
    </span>
    <span class="label">uuid</span>
    <span id="identity-uuid" class="value uuid">…</span>
  </div>

  <div id="consent-line" class="consent-line">
    <div class="consent-line-row">
      <span class="consent-line-label">This tab:</span>
      <span id="consent-state" class="consent-state">…</span>
      <div id="consent-buttons" class="consent-buttons"></div>
    </div>
  </div>

  <button id="reconnect" class="reconnect">Reconnect</button>

  <div id="consented-tabs" class="consented-tabs"></div>

  <div id="custom-actions"></div>

  <div id="message"></div>
  <a id="options-link">Options…</a>

  <script src="../src/popup.js"></script>
</body>
</html>
